<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie's Delight - Menu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">🍽️ Foodie's <span>Delight</span></a>
    <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('show')">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="order.html" id="nav-order">Order <span class="cart-badge" id="nav-badge" style="display:none">0</span></a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="section">
    <h1 class="section-title">Our Menu</h1>
    <p class="section-subtitle">Delicious dishes prepared with love</p>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <div class="cart-bar" id="cart-bar">
    <span id="cart-bar-info">0 items</span>
    <a href="order.html" class="btn">Proceed to Order →</a>
  </div>

  <footer class="footer">
    <p>© 2025 Foodie's Delight. Made with ❤️</p>
  </footer>

  <script src="js/cart.js"></script>
  <script>
  // Load menu from XML
  fetch('xml/menu.xml')
    .then(function(r) { return r.text(); })
    .then(function(xml) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(xml, 'text/xml');
      var items = doc.querySelectorAll('item');
      var categories = ['All'];
      var menuHTML = '';

      items.forEach(function(item) {
        var id = item.querySelector('id').textContent;
        var name = item.querySelector('name').textContent;
        var price = item.querySelector('price').textContent;
        var cat = item.querySelector('category').textContent;
        var image = item.querySelector('image').textContent;
        var desc = item.querySelector('description').textContent;
        if (categories.indexOf(cat) === -1) categories.push(cat);
        var catClass = cat === 'Veg' ? 'cat-veg' : cat === 'Non-Veg' ? 'cat-nonveg' : 'cat-drinks';

        menuHTML += '<div class="menu-card" data-cat="' + cat + '">' +
          '<div style="overflow:hidden"><img src="' + image + '" alt="' + name + '"></div>' +
          '<div class="card-body">' +
            '<span class="category-badge ' + catClass + '">' + cat + '</span>' +
            '<h3>' + name + '</h3>' +
            '<p class="desc">' + desc + '</p>' +
            '<div class="card-footer">' +
              '<span class="price">₹' + price + '</span>' +
              '<button class="btn-add" id="btn-' + id + '" onclick="addToCart(' + id + ',\'' + name.replace(/'/g,"\\'") + '\',' + price + ',\'' + image + '\')">🛒 Add to Order</button>' +
            '</div>' +
          '</div></div>';
      });

      document.getElementById('menu-grid').innerHTML = menuHTML;

      // Filter buttons
      var filterHTML = '';
      categories.forEach(function(c) {
        filterHTML += '<button class="btn btn-outline' + (c === 'All' ? ' active' : '') + '" onclick="filterMenu(\'' + c + '\', this)">' + c + '</button>';
      });
      document.getElementById('filter-bar').innerHTML = filterHTML;
    });

  function filterMenu(cat, btn) {
    document.querySelectorAll('.filter-bar .btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.menu-card').forEach(function(card) {
      card.style.display = (cat === 'All' || card.dataset.cat === cat) ? '' : 'none';
    });
  }
  </script>
</body>
</html>
